# 10 PW ELI-NP extrapolation.  ELI-NP is identified by the Timmis paper as a
# flagship facility for SHHG-based strong-field QED studies; a₀ ~ 60 if focused
# similarly to Gemini.
model: surface_pipeline
backend: analytical

laser:
  a0: 60.0
  wavelength_um: 0.8
  duration_fs: 25.0
  polarization: p
  envelope: gaussian
  angle_deg: 45.0
  spatial_profile: super_gaussian
  spot_fwhm_um: 2.0
  super_gaussian_order: 8

target:
  kind: overdense
  material: SiO2
  n_over_nc: 200.0
  gradient_L_over_lambda: 0.10
  reflectivity: 0.5
  t_HDR_fs: 351.0
  prepulse_intensity_rel: 5.0e-4
  prepulse_delay_fs: 60.0

numerics:
  pipeline_grid: 128
  pipeline_dx_um: 0.08
  diag_harmonics: [1, 30, 60, 100]
