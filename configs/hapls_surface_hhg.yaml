# HAPLS (Yb:YAG DPSSL, 1.03 μm, 30 fs, 10 Hz) driving a fused-silica
# overdense target through the full Timmis-style CHF pipeline.
# Peak intensity ~1 PW/2 μm² FWHM ⇒ a₀ ≈ 15 at 1.03 μm.
# Expect harmonic output in the soft-X-ray band; run through
# `harmony detector ... --band xray-soft` to fold in the filter stack.
model: surface_pipeline
backend: analytical

laser:
  preset: hapls
  angle_deg: 45.0
  spatial_profile: super_gaussian
  spot_fwhm_um: 2.0
  super_gaussian_order: 8

target:
  kind: overdense
  material: SiO2
  n_over_nc: 200.0
  gradient_L_over_lambda: 0.14
  reflectivity: 0.6
  t_HDR_fs: 351.0

numerics:
  n_periods: 30.0
  samples_per_period: 512
  pipeline_grid: 128
  pipeline_dx_um: 0.10
  diag_harmonics: [1, 12, 25, 47]
